name: Bug report
description: Something isn't working as expected.
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug. Please fill in the fields below — vague reports take longer to triage.

  - type: input
    id: version
    attributes:
      label: Version / commit
      description: Package version, release tag, or commit SHA.
      placeholder: "e.g. v0.1.0 or commit abc1234"
    validations:
      required: true

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug, including any error messages or screenshots.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Be specific. A minimal reproduction is the fastest path to a fix.
      placeholder: |
        1. Run `pnpm dev`
        2. Navigate to `/foo`
        3. Click "Bar"
        4. See error
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, runtime version, browser if relevant, deployment context (local, self-hosted, hosted).
      placeholder: |
        - OS: macOS 14.4
        - Node: 22.11.0
        - pnpm: 10.32.1
        - Browser: Firefox 124
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Paste any error logs or stack traces. Use code blocks for readability.
      render: shell

  - type: checkboxes
    id: terms
    attributes:
      label: Code of Conduct
      options:
        - label: I have read and agree to follow the [Code of Conduct](https://github.com/commons-oss/.github/blob/main/CODE_OF_CONDUCT.md).
          required: true
